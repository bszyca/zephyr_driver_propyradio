manifest:
  self:
    west-commands: scripts/west-commands.yml

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: c33743ef955b066a5711097a6b0e184de1519b7f #v3.6.0-rc3
      import:
        # By using name-allowlist we can clone only the modules that are
        # strictly needed by the application.
        name-allowlist:
          - cmsis      # required by the ARM port
          - hal_nordic # required by the nRF52 board (Nordic based)
          - hal_stm32  # required by the nucleo board (STM32 based)
          - hal_espressif  # required by the esp32 board (ESP32 based)
